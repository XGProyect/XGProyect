version: '3.7'
services: 
  xgp:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    container_name: xgp
    expose:
      - 80
      - 443
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./src/upload:/var/www/html:delegated
    networks:
      - xgp
  mysql:
    image: mysql:5.7.29
    container_name: mysql
    restart: unless-stopped
    tty: true
    ports:
      - 3306:3306
    volumes:
      - ./db:/var/lib/mysql
      - ./data:/docker-entrypoint-initdb.d
    environment:
      MYSQL_DATABASE: xgp
      MYSQL_ROOT_PASSWORD: root
    networks:
      - xgp
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
        - "8081:80"
    environment:
        MYSQL_ROOT_PASSWORD: root
        PMA_HOST: mysql
    networks:
      - xgp
networks:
  xgp:
